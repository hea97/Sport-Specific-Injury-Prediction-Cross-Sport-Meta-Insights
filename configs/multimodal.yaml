{
  "seed": 42,
  "dataset": {
    "name": "Multimodal",
    "path": "data/sports_multimodal_data.csv",
    "loader": "multimodal"
  },
  "label": {
    "target_column": "target",
    "strategy": "existing_column",
    "source_column": "injury_risk",
    "positive_values": [1]
  },
  "features": {
    "builder": "multimodal",
    "numeric_features": [
      "heart_rate",
      "fatigue_index",
      "workload_intensity",
      "rest_period",
      "training_duration",
      "Physiology_Stress_Index",
      "Biomechanical_Load_Index",
      "Recovery_Debt_Index",
      "Load_Score"
    ],
    "categorical_features": []
  },
  "models": [
    {
      "name": "RF",
      "type": "random_forest",
      "hyperparameters": {
        "n_estimators": 300,
        "max_depth": 20
      }
    },
    {
      "name": "XGB",
      "type": "xgboost",
      "hyperparameters": {
        "n_estimators": 300,
        "max_depth": 8,
        "learning_rate": 0.1
      }
    },
    {
      "name": "LGB",
      "type": "lightgbm",
      "hyperparameters": {
        "n_estimators": 300,
        "max_depth": 10,
        "learning_rate": 0.1
      }
    },
    {
      "name": "MLP",
      "type": "mlp",
      "hyperparameters": {
        "hidden_dims": [128, 64, 32],
        "dropout": 0.3,
        "learning_rate": 0.001,
        "epochs": 50,
        "batch_size": 128
      }
    }
  ],
  "imbalance": {
    "smote": true,
    "k_neighbors": 5
  },
  "evaluation": {
    "test_size": 0.2,
    "thresholding": {
      "strategy": "fixed",
      "threshold": 0.5
    },
    "cross_validation": {
      "enabled": false,
      "n_splits": 5
    }
  },
  "artifacts": {
    "results_csv": "results/multimodal_results.csv",
    "artifact_dir": "results/artifacts/multimodal"
  },
  "visualization": {
    "high_risk_x": "workload_intensity",
    "high_risk_y": "rest_period"
  }
}
